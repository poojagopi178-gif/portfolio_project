<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pooja G | Portfolio</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
    <h1>Pooja G</h1>
    <p>Student | Web Developer</p>
</header>

<section id="about">
    <h2>About Me</h2>
    <p>I am a student learning full stack development.</p>
</section>

<section id="skills">
    <h2>Skills</h2>
    <div class="skill">
        <p>HTML & CSS</p>
        <div class="bar"><div style="width:90%"></div></div>
    </div>
    <div class="skill">
        <p>Python</p>
        <div class="bar"><div style="width:70%"></div></div>
    </div>
    <div class="skill">
        <p>Flask</p>
        <div class="bar"><div style="width:60%"></div></div>
    </div>
</section>

<section id="projects">
    <h2>Projects</h2>
    <div class="project-card">
        <h3>Portfolio Website</h3>
        <p>Mini project using HTML, CSS, Node.js</p>
    </div>
</section>

<section id="contact">
    <h2>Contact Me</h2>

    <form id="contactForm">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" placeholder="Your Message" required></textarea>
        <button type="submit">Send</button>
    </form>

    <p id="response"></p>
</section>

<script src="/static/script.js"></script>
</body>
</html>
